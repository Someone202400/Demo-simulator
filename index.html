<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aerospace Physics Simulator | TranspEq</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>Rocket Physics Modeling Tool</h1>
        <p>IEEE ISEC 2027 Research Project — Equation Transparency Engine</p>
    </header>

    <main class="app-container">
        <section class="control-panel">
            <h2>1. Environment Settings</h2>
            <div class="environment-card">
                <label>Headwind / Wind Speed (m/s): 
                    <input type="number" id="env-wind" value="5" step="0.5">
                </label>
                <label style="margin-top: 10px; display: block;">
                    <input type="checkbox" id="env-density-var" checked> Enable Altitude-Based Air Density (ρ)
                </label>
            </div>

            <h2>2. Build Your Rocket</h2>
            <div class="component-blueprint">
                <button onclick="addComponent('nose')">+ Nose Cone</button>
                <button onclick="addComponent('body')">+ Body Tube</button>
                <button onclick="addComponent('tank')">+ Fuel Tank</button>
                <button onclick="addComponent('engine')">+ Engine</button>
            </div>

            <h3>Current Assembly (Top to Bottom)</h3>
            <div id="rocket-assembly-list" class="assembly-list">
                </div>

            <div id="validation-box" class="validation-box">
                Add components to begin configuration.
            </div>

            <button id="run-sim-btn" class="primary-btn" disabled>Run Physics Simulation</button>
        </section>

        <section class="display-panel">
            <div id="results-summary" class="results-grid hidden">
                </div>

            <div class="charts-container">
                <div class="chart-box"><canvas id="altitudeChart"></canvas></div>
                <div class="chart-box"><canvas id="velocityChart"></canvas></div>
            </div>

            <div id="equation-breakdown" class="equation-container hidden">
                <h2>3. Real-Time Mathematical Breakdown</h2>
                </div>
        </section>
    </main>

    <script src="js/components.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/physics.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
